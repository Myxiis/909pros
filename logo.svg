<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60">
  <!-- House icon -->
  <g transform="translate(4, 6)">
    <!-- Roof -->
    <polygon points="24,2 46,18 2,18" fill="#f97316"/>
    <!-- House body -->
    <rect x="6" y="18" width="36" height="26" fill="#1a3a5c"/>
    <!-- Door -->
    <rect x="18" y="30" width="12" height="14" rx="2" fill="#f97316"/>
    <!-- Window left -->
    <rect x="8" y="22" width="8" height="7" rx="1" fill="#ffffff" opacity="0.8"/>
    <!-- Window right -->
    <rect x="32" y="22" width="8" height="7" rx="1" fill="#ffffff" opacity="0.8"/>
  </g>
  <!-- 909 text -->
  <text x="58" y="42" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="#f97316" letter-spacing="-1">909</text>
  <!-- PROS text -->
  <text x="136" y="42" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="#1a3a5c" letter-spacing="1">PROS</text>
  <!-- Tagline -->
  <text x="58" y="55" font-family="Arial, sans-serif" font-size="9.5" fill="#666" letter-spacing="1.5">INLAND EMPIRE HOME SERVICES</text>
</svg>
